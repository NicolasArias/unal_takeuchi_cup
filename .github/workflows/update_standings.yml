name: Update Standings from AtCoder

on:
  workflow_dispatch:
    inputs:
      contest_id:
        description: 'AtCoder Contest ID (e.g., abc340)'
        required: true
        type: string

jobs:
  update-standings:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run standings updater script
        run: node backend/updateStandings.js ${{ github.event.inputs.contest_id }}
        env:
          # You can add your SHEET_CSV_URL in repository secrets
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL || '' }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add front/src/data/mockStandings.js
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(standings): update standings for contest ${{ github.event.inputs.contest_id }}"
            git push
          else
            echo "No changes detected. Nothing to commit."
          fi
